<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Space Jam: Seeing Megaprojects From Space</title>
<meta name="description" content="Interactive explorer for Malaysia's transport corridors: satellite nighttime lights (NASA Black Marble), 1-km cells, quarterly 2012–2024."/>
<link rel="stylesheet" href="lib/maplibre-gl.css"/>
<link rel="stylesheet" href="style.css?v=29"/>
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon_32.png"/>
<link rel="icon" type="image/png" sizes="64x64" href="img/favicon_64.png"/>
<link rel="apple-touch-icon" href="img/favicon_64.png"/>
</head>
<body>
<div id="loader"><img class="ds" src="img/death_star_8bit.png" alt=""/><div class="lt" id="loadertext">INSERT COIN</div></div>

<div id="app">
  <div id="marquee">
    <span class="star">★</span>
    <h1>Space Jam: Seeing Megaprojects From Space</h1>
    <span class="star c">★</span>
    <span class="msub">Malaysia transport corridors · 2012–2024 · 1-km quarterly nightlights</span>
  </div>
  <header>
    <img id="deathstar" src="img/death_star_8bit.png" alt="" title="That's no moon."/>
    <div id="controlbox">
      <div id="corridorwrap">
        <span class="cw-label">Corridor</span>
        <select id="corridorsel"></select>
      </div>
      <div class="seg" id="layerseg">
        <button data-layer="ntl" class="active" title="NASA Black Marble radiance, 1-km cells, quarterly">Nightlights</button>
        <span id="credit">CREDIT 49/49 QTRS</span>
      </div>
    </div>
    <div class="hgroup" id="ntlopts">
      <label class="chk"><input type="checkbox" id="ck-stations" checked/>Stations</label>
      <label class="chk"><input type="checkbox" id="ck-buffers"/>30-km buffers</label>
      <label class="chk"><input type="checkbox" id="ck-dim" checked/>Dim others</label>
    </div>
  </header>

  <div id="main">
    <div id="mapwrap">
      <div id="map"></div>
      <div id="layerbadge">
        <div class="title" id="layertitle"></div>
        <div id="corridorcard"></div>
      </div>
      <div id="maphint">double-click a corridor route to zoom · click a cell for its history</div>
      <div id="legend"></div>
      <div id="openflag"></div>
      <div id="storyflags"></div>
      <div id="timebar">
        <span class="mode-note" id="timemode">quarterly</span>
        <button id="playbtn" title="play / pause">▶</button>
        <div class="slider-wrap">
          <div class="qblocks" id="qblocks"></div>
          <input type="range" id="timeslider" min="0" max="48" value="48" step="1" style="width:100%"/>
          <span class="slider-flag" id="sliderflag" style="display:none"></span>
        </div>
        <div id="timelabel">2024 Q1</div>
      </div>
    </div>

    <button id="sidetoggle" title="open panels">▦</button>
    <div id="side">
      <div id="tabs">
        <button data-tab="explore" class="active">Explore</button>
        <button data-tab="guide">Guide</button>
        <button data-tab="about">About</button>
      </div>
      <div id="sidebody"></div>
    </div>
  </div>
</div>

<script src="lib/maplibre-gl.js"></script>
<script src="lib/deck.gl.min.js"></script>
<script src="lib/echarts.min.js"></script>
<script src="app.js?v=29"></script>
</body>
</html>
